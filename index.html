<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JAM MUSIC SCHOOL</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#000;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .v-bg{position:fixed;inset:0;z-index:0}
  .v-slide{position:absolute;inset:0;opacity:0;transition:opacity var(--fade,1.2s) ease-in-out;will-change:opacity}
  .v-slide.active{opacity:1}
  .v-slide img{width:100%;height:100%;object-fit:cover;display:block;animation:kenburns var(--kb-dur,16s) ease-in-out infinite alternate;will-change:transform}
  @keyframes kenburns{from{transform:scale(1.04)}to{transform:scale(1.20)}}
  body.nozoom .v-slide img{animation:none}
  .v-cta{display:inline-block;margin-top:1.7em;padding:.72em 1.6em;border-radius:999px;background:var(--accent,#ffcf6b);color:#141414;font-weight:700;font-size:clamp(14px,1.8vw,18px);text-decoration:none;box-shadow:0 6px 22px rgba(0,0,0,.28)}
  .v-cta:hover{filter:brightness(1.06)}
  .v-table{width:min(620px,92vw);margin:1.7em auto 0;border-radius:18px;overflow:hidden;color:#fff;text-shadow:none;text-align:left;background:rgba(18,18,20,.45);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.16);box-shadow:0 14px 44px rgba(0,0,0,.34)}
  .v-table .row{display:grid;grid-template-columns:36% 1fr;gap:14px;padding:15px 22px;border-top:1px solid rgba(255,255,255,.12)}
  .v-table .row:first-child{border-top:0}
  .v-table .k{font-weight:700;font-size:clamp(16px,2.1vw,23px);opacity:.92}
  .v-table .val{font-size:clamp(18px,2.4vw,27px);line-height:1.6}
  .v-table .val s{opacity:.55}
  .v-table .hot{color:#ff7a70;font-weight:700}
  .v-scrim{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,calc(var(--scrim,.45)*.7)) 0%,rgba(0,0,0,var(--scrim,.45)) 45%,rgba(0,0,0,calc(var(--scrim,.45)*.85)) 100%)}
  .v-content{position:relative;z-index:2;color:var(--ink,#fff);text-shadow:0 2px 26px rgba(0,0,0,.32)}
  .v-sec{min-height:100svh;display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;padding:14vh 26px;max-width:960px;margin:0 auto}
  .v-content>.v-sec:first-child{justify-content:flex-start;padding-top:15vh}
  .v-eyebrow{font-size:clamp(13px,1.5vw,19px);font-weight:600;letter-spacing:.03em;color:var(--accent,#ffcf6b);margin-bottom:.85em}
  .v-title{font-size:clamp(34px,8.2vw,88px);line-height:1.09;font-weight:700;letter-spacing:-.012em}
  .v-body{font-size:clamp(17px,2.2vw,25px);line-height:1.7;font-weight:500;margin-top:1.15em;max-width:30em;opacity:.94}
  .v-sec .v-eyebrow,.v-sec .v-title,.v-sec .v-body,.v-sec .v-table,.v-sec .v-cta{
    opacity:0;transform:translateY(34px);filter:blur(7px);will-change:opacity,transform,filter;
    transition:opacity 1s cubic-bezier(.16,.8,.3,1),transform 1s cubic-bezier(.16,.8,.3,1),filter 1s ease}
  .v-sec.in .v-eyebrow{opacity:1;transform:none;filter:none}
  .v-sec.in .v-title{opacity:1;transform:none;filter:none;transition-delay:.09s}
  .v-sec.in .v-body{opacity:1;transform:none;filter:none;transition-delay:.2s}
  .v-sec.in .v-table{opacity:1;transform:none;filter:none;transition-delay:.26s}
  .v-sec.in .v-cta{opacity:1;transform:none;filter:none;transition-delay:.34s}
  @media (prefers-reduced-motion:reduce){
    .v-sec .v-eyebrow,.v-sec .v-title,.v-sec .v-body,.v-sec .v-table,.v-sec .v-cta{opacity:1;transform:none;filter:none;transition:none}
    .v-slide{transition-duration:.3s}.v-slide img{animation:none}}
</style>
</head>
<body>
  <div id="app"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://jyrmjfouetolzdcailgx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cQOPjGJu267P5GOAWIpDCg_xa_3HsnX';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

function renderViewer(state, root){
  var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  if(root.__iv)clearInterval(root.__iv);
  if(root.__io)root.__io.disconnect();
  root.innerHTML='';
  var r=document.documentElement.style;
  r.setProperty('--show',(state.show||3.5)+'s');
  r.setProperty('--fade',(state.fade||1.2)+'s');
  r.setProperty('--scrim',(state.scrim==null?0.45:state.scrim));
  r.setProperty('--accent',state.accent||'#ffcf6b');
  document.body.style.setProperty('--ink',state.dark?'#111':'#fff');
  document.body.classList.toggle('nozoom',state.zoom===false);
  var bg=document.createElement('div');bg.className='v-bg';
  var photos=state.photos||[];
  photos.forEach(function(src,i){
    var s=document.createElement('div');s.className='v-slide'+(i===0?' active':'');
    var im=document.createElement('img');im.src=src;im.alt='';
    im.style.setProperty('--kb-dur',(10+Math.random()*8).toFixed(1)+'s');
    im.style.transformOrigin=(20+Math.random()*60).toFixed(0)+'% '+(20+Math.random()*60).toFixed(0)+'%';
    im.style.animationDirection=Math.random()<0.5?'alternate':'alternate-reverse';
    im.style.animationDelay=(-Math.random()*8).toFixed(1)+'s';
    s.appendChild(im);bg.appendChild(s);
  });
  root.appendChild(bg);
  var scrim=document.createElement('div');scrim.className='v-scrim';root.appendChild(scrim);
  var main=document.createElement('main');main.className='v-content';
  (state.sections||[]).forEach(function(sec){
    var s=document.createElement('section');s.className='v-sec reveal';
    var h='';
    if(sec.eyebrow)h+='<p class="v-eyebrow">'+esc(sec.eyebrow)+'</p>';
    if(sec.title)h+='<h2 class="v-title">'+esc(sec.title).replace(/\n/g,'<br>')+'</h2>';
    if(sec.body)h+='<p class="v-body">'+esc(sec.body).replace(/\n/g,'<br>')+'</p>';
    if(sec.table&&sec.table.length){
      var rows=sec.table.map(function(r){
        var v=esc(r.value).replace(/\n/g,'<br>').replace(/~([^~]+)~/g,'<s>$1</s>').replace(/\*([^*]+)\*/g,'<span class="hot">$1</span>');
        return '<div class="row"><div class="k">'+esc(r.label)+'</div><div class="val">'+v+'</div></div>';
      }).join('');
      h+='<div class="v-table">'+rows+'</div>';
    }
    if(sec.link&&sec.link.url)h+='<a class="v-cta" href="'+esc(sec.link.url)+'" target="_blank" rel="noopener">'+esc(sec.link.text||'詳しく見る')+'</a>';
    s.innerHTML=h;main.appendChild(s);
  });
  root.appendChild(main);
  if(photos.length>1){
    var slides=bg.querySelectorAll('.v-slide'),cur=0;
    var SHOW=(state.show||3.5)*1000,FADE=(state.fade||1.2)*1000;
    root.__iv=setInterval(function(){
      slides[cur].classList.remove('active');
      cur=(cur+1)%slides.length;
      slides[cur].classList.add('active');
    },SHOW+FADE);
  }
  var els=main.querySelectorAll('.reveal');
  if('IntersectionObserver' in window){
    root.__io=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting)e.target.classList.add('in');});},{threshold:0.2});
    els.forEach(function(el){root.__io.observe(el);});
  }else{els.forEach(function(el){el.classList.add('in');});}
}

const app=document.getElementById('app');
try{
  const { data, error } = await sb.from('hero').select('data').eq('id',1).single();
  if(error) throw error;
  renderViewer(data.data, app);
}catch(e){
  app.innerHTML='<div style="color:#fff;padding:40px;font-size:14px;opacity:.7">読み込みに失敗しました。時間をおいて再度お試しください。</div>';
  console.error(e);
}
</script>
</body>
</html>
